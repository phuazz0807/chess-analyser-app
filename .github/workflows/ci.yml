name: CI

on:
  push:
    branches: [ main, dev, cicd ]
  pull_request:
    branches: [ main, dev ]

jobs:
  backend-lint-and-test:
    name: Backend Linting & Build Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        pip install -r requirements.txt
    
    - name: Lint with flake8
      working-directory: ./backend
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. Line length set to 88 (black default)
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics
    
    - name: Check if app can start
      working-directory: ./backend
      run: |
        # Verify the main module can be imported
        python -c "from app import core, crud, models, routers, schemas; print('✓ All modules imported successfully')"

  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
    
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
    
    - name: Run unit tests
      working-directory: ./backend
      run: pytest tests -v

  frontend-lint-and-build:
    name: Frontend Linting & Build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Run ESLint
      working-directory: ./frontend
      run: npm run lint
    
    - name: Build project
      working-directory: ./frontend
      run: npm run build

  semgrep-sast:
    name: Security Scanning (SAST)
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Semgrep
      uses: semgrep/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/python
          p/javascript
          p/react
          p/owasp-top-ten
        auditOn: push

  backend-dast:
    name: Backend DAST Scan
    runs-on: ubuntu-latest

    env:
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: test_db
      SECRET_KEY: dast-scan-secret-key

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Start backend for DAST
      working-directory: ./backend
      run: |
        nohup uvicorn main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &

    - name: Wait for backend to become ready
      working-directory: ./backend
      run: |
        for i in {1..20}; do
          if curl --silent --fail http://127.0.0.1:8000/docs > /dev/null; then
            echo "Backend is ready for DAST."
            exit 0
          fi
          sleep 3
        done
        echo "Backend failed to start for DAST."
        cat uvicorn.log
        exit 1

    - name: Run OWASP ZAP baseline scan
      uses: zaproxy/action-baseline@v0.15.0
      with:
        target: 'http://127.0.0.1:8000/docs'
        cmd_options: '-j'
        allow_issue_writing: false
        fail_action: false
        artifact_name: zap-baseline-report
